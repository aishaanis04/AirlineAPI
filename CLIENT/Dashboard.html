<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AeroDash - Live Operations Executive Center</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .card { border: none; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); }
    .chart-container { position: relative; height: 320px; width: 100%; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="Dashboard.html"><i class="fas fa-plane-departure me-2"></i>AeroDash Hub</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li><a class="nav-link active" href="Dashboard.html">Dashboard</a></li>
          <li><a class="nav-link" href="flights.html">Flights</a></li>
          <li><a class="nav-link" href="passengers.html">Passengers</a></li>
          <li><a class="nav-link" href="tickets.html">Tickets</a></li>
          <li><a class="nav-link" href="airlines.html">Airlines</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-5 gap-3">
      <div>
        <h1 class="fw-bold text-dark mb-1">Live Database Analytics</h1>
        <p class="text-muted mb-0">Compiled real-time metric streams from view table: <code class="text-danger bg-white p-1 rounded fw-bold">/details</code></p>
      </div>
      <button class="btn btn-primary px-4 py-2 shadow-sm fw-semibold" onclick="fetchDatabaseDetailsView()">
        <i class="fas fa-sync-alt me-2"></i>Sync Live Analytics
      </button>
    </div>

    <h3 class="fw-bold text-secondary mb-3" style="font-size:1.1rem; letter-spacing: 0.5px;">SYSTEM RECORD SUMMARY</h3>
    <div class="row g-4 mb-5" id="viewMetricsGridContainer">
      <div class="col-12 text-center py-4">
        <div class="spinner-border text-primary" role="status"></div>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-12 col-lg-7">
        <div class="card p-4 h-100">
          <h5 class="fw-bold text-dark mb-3"><i class="fas fa-chart-bar text-primary me-2"></i>Database Volume Comparison</h5>
          <div class="chart-container">
            <canvas id="analyticsBarChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-5">
        <div class="card p-4 h-100">
          <h5 class="fw-bold text-dark mb-3"><i class="fas fa-chart-pie text-success me-2"></i>Distribution Share Breakdown</h5>
          <div class="chart-container">
            <canvas id="analyticsPieChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ PASTE YOUR ACTUAL CODESPACES PORT 3000 URL HERE (No trailing slash at the end!)
    const API_ENDPOINT = "https://fictional-space-fishstick-v6xgj6w979wq269wr-3000.app.github.dev";

    // Keep references to chart instances so we can update/destroy them cleanly when refreshing
    let barChartInstance = null;
    let pieChartInstance = null;

    async function fetchDatabaseDetailsView() {
      const container = document.getElementById('viewMetricsGridContainer');
      try {
        const res = await fetch(`${API_ENDPOINT}/details`);
        if(!res.ok) throw new Error("Backend connection issue");
        const rows = await res.json();
        container.innerHTML = "";

        if (!rows || rows.length === 0) {
          container.innerHTML = `<div class="col-12 text-center py-4 text-muted"><i class="fas fa-database mb-2 fa-2x"></i><br>View "details" returned empty results.</div>`;
          return;
        }

        const dataRecord = rows[0];
        
        // Define clean visual identifiers mapping to columns
        const iconConfig = { flight: 'fa-plane', passenger: 'fa-users', ticket: 'fa-ticket-alt', airline: 'fa-building', aircraft: 'fa-plane', airport: 'fa-plane-arrival', default: 'fa-database' };
        const colorThemes = ['#0d6efd', '#198754', '#ffc107', '#0dcaf0', '#dc3545', '#6c757d'];
        const borderClasses = ['primary', 'success', 'warning', 'info', 'danger', 'secondary'];
        
        // Preparation arrays for the charts
        let chartLabels = [];
        let chartDataValues = [];
        
        let counter = 0;
        for (const [key, val] of Object.entries(dataRecord)) {
          // Format labels neatly (e.g. total_passengers or Total_flight becomes FLIGHT)
          let cleanTitle = key.replace(/^(total_|Total_)/, '').toUpperCase();
          let useIcon = iconConfig[cleanTitle.toLowerCase()] || iconConfig.default;
          let useColorClass = borderClasses[counter % borderClasses.length];
          
          chartLabels.push(cleanTitle);
          chartDataValues.push(Number(val));
          counter++;

          // Inject numeric grid metric elements dynamic display cards
          container.insertAdjacentHTML('beforeend', `
            <div class="col-12 col-sm-6 col-xl-3">
              <div class="card p-4 border-start border-${useColorClass} border-5 bg-white">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <span class="text-muted text-uppercase small fw-bold" style="letter-spacing:0.5px;">${cleanTitle}s</span>
                    <h2 class="fw-bold my-1 text-dark">${val}</h2>
                  </div>
                  <i class="fas ${useIcon} fa-2x text-${useColorClass}" style="opacity: 0.3;"></i>
                </div>
              </div>
            </div>
          `);
        }

        // Render charts dynamically using the populated database metrics
        renderVisualCharts(chartLabels, chartDataValues, colorThemes);

      } catch (err) {
        container.innerHTML = `<div class="col-12 text-center py-4 text-danger fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Failed to fetch real-time analytics data points.</div>`;
      }
    }

    function renderVisualCharts(labels, dataValues, hexColors) {
      // Clear out older instances if clicking the sync button multiple times
      if(barChartInstance) barChartInstance.destroy();
      if(pieChartInstance) pieChartInstance.destroy();

      // 1. Bar Chart Setup
      const ctxBar = document.getElementById('analyticsBarChart').getContext('2d');
      barChartInstance = new Chart(ctxBar, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Record Inventory count',
            data: dataValues,
            backgroundColor: hexColors.slice(0, labels.length),
            borderRadius: 6,
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, grid: { color: 'rgba(0, 0, 0, 0.05)' } }, x: { grid: { display: false } } }
        }
      });

      // 2. Pie Chart Setup
      const ctxPie = document.getElementById('analyticsPieChart').getContext('2d');
      pieChartInstance = new Chart(ctxPie, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            data: dataValues,
            backgroundColor: hexColors.slice(0, labels.length),
            hoverOffset: 10
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'right', labels: { boxWidth: 15, font: { family: 'Segoe UI', size: 12 } } }
          }
        }
      });
    }

    // Launch initial load when Document Engine triggers ready state
    document.addEventListener("DOMContentLoaded", fetchDatabaseDetailsView);
  </script>
</body>
</html>
