<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AeroDash - Flights Engine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 24px; background: white; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="Dashboard.html"><i class="fas fa-plane-departure me-2"></i>AeroDash</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li><a class="nav-link" href="Dashboard.html">Dashboard</a></li>
          <li><a class="nav-link active" href="flights.html">Flights</a></li>
          <li><a class="nav-link" href="passengers.html">Passengers</a></li>
          <li><a class="nav-link" href="tickets.html">Tickets</a></li>
          <li><a class="nav-link" href="Airlinea.html">Airlines</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h1 class="fw-bold mb-4">Flight Console</h1>

    <div class="card mb-4">
      <h5 class="fw-bold text-primary mb-3" id="formHeader"><i class="fas fa-plus-circle me-2"></i>Create New Flight Entry</h5>
      <form id="flightForm" onsubmit="handleFlightSubmit(event)">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label small fw-bold">Airline ID</label>
            <input type="number" id="airline_id" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Departure Time</label>
            <input type="datetime-local" id="departure_time" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Arrival Time</label>
            <input type="datetime-local" id="arrival_time" class="form-control" required>
          </div>
          <div class="col-md-3">
            <label class="form-label small fw-bold">Status</label>
            <input type="text" id="status" class="form-control" placeholder="e.g., On Time" required>
          </div>
        </div>
        <div class="mt-3 text-end">
          <button type="button" class="btn btn-light border me-2" onclick="clearFlightForm()">Reset</button>
          <button type="submit" id="submitBtn" class="btn btn-primary px-4">Save Entry</button>
        </div>
      </form>
    </div>

    <div class="card">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>FLIGHT ID</th>
            <th>AIRLINE ID</th>
            <th>DEPARTURE</th>
            <th>ARRIVAL</th>
            <th>STATUS</th>
            <th class="text-end">ACTIONS</th>
          </tr>
        </thead>
        <tbody id="flightTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API_ENDPOINT = "https://fictional-space-fishstick-v6xgj6w979wq269wr-3000.app.github.dev";
    let activeFlightId = null;

    async function loadFlightsData() {
      const tbody = document.getElementById('flightTableBody');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div></td></tr>`;
      try {
        const res = await fetch(`${API_ENDPOINT}/flights`);
        const rows = await res.json();
        tbody.innerHTML = "";
        
        rows.forEach(row => {
          tbody.insertAdjacentHTML('beforeend', `
            <tr>
              <td><strong>#${row.flight_id}</strong></td>
              <td>${row.airline_id}</td>
              <td>${new Date(row.departure_time).toLocaleString()}</td>
              <td>${new Date(row.arrival_time).toLocaleString()}</td>
              <td><span class="badge bg-primary">${row.status}</span></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-secondary me-1" onclick='setupFlightEdit(${JSON.stringify(row)})'><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteFlightEntry(${row.flight_id})"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `);
        });
      } catch (err) { tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error downloading data.</td></tr>`; }
    }

    async function handleFlightSubmit(e) {
      e.preventDefault();
      const payload = {
        airline_id: parseInt(document.getElementById('airline_id').value),
        departure_time: document.getElementById('departure_time').value,
        arrival_time: document.getElementById('arrival_time').value,
        status: document.getElementById('status').value
      };

      const endpointUrl = activeFlightId ? `${API_ENDPOINT}/flights/${activeFlightId}` : `${API_ENDPOINT}/flights`;
      const requestMethod = activeFlightId ? 'PUT' : 'POST';

      const response = await fetch(endpointUrl, {
        method: requestMethod,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        clearFlightForm();
        loadFlightsData();
      } else {
        alert("Action rejected by backend API database rules.");
      }
    }

    function setupFlightEdit(row) {
      activeFlightId = row.flight_id;
      document.getElementById('formHeader').innerHTML = `<i class="fas fa-edit me-2"></i>Updating Flight Entry #${activeFlightId}`;
      document.getElementById('submitBtn').innerText = "Apply Updates";
      document.getElementById('airline_id').value = row.airline_id;
      document.getElementById('departure_time').value = new Date(row.departure_time).toISOString().slice(0, 16);
      document.getElementById('arrival_time').value = new Date(row.arrival_time).toISOString().slice(0, 16);
      document.getElementById('status').value = row.status;
    }

    function clearFlightForm() {
      activeFlightId = null;
      document.getElementById('flightForm').reset();
      document.getElementById('formHeader').innerHTML = `<i class="fas fa-plus-circle me-2"></i>Create New Flight Entry`;
      document.getElementById('submitBtn').innerText = "Save Entry";
    }

    async function deleteFlightEntry(id) {
      if (confirm("Confirm permanent removal of this entry?")) {
        await fetch(`${API_ENDPOINT}/flights/${id}`, { method: 'DELETE' });
        loadFlightsData();
      }
    }

    document.addEventListener("DOMContentLoaded", loadFlightsData);
  </script>
</body>
</html>
