<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AeroDash - Passenger Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 24px; background: white; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="Dashboard.html"><i class="fas fa-plane-departure me-2"></i>AeroDash</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li><a class="nav-link" href="Dashboard.html">Dashboard</a></li>
          <li><a class="nav-link" href="flights.html">Flights</a></li>
          <li><a class="nav-link active" href="passengers.html">Passengers</a></li>
          <li><a class="nav-link" href="tickets.html">Tickets</a></li>
          <li><a class="nav-link" href="Airlines.html">Airlines</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <h1 class="fw-bold mb-4">Passenger Records</h1>

    <div class="card mb-4">
      <h5 class="fw-bold text-success mb-3" id="formHeader"><i class="fas fa-user-plus me-2"></i>Register New Profile</h5>
      <form id="passengerForm" onsubmit="handlePassengerSubmit(event)">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label small fw-bold">Full Name</label>
            <input type="text" id="name" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Nationality</label>
            <input type="text" id="nationality" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label small fw-bold">Phone Number</label>
            <input type="text" id="phone" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold">Email Address</label>
            <input type="email" id="email" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label small fw-bold">Passport ID</label>
            <input type="text" id="passport_id" class="form-control" required>
          </div>
        </div>
        <div class="mt-3 text-end">
          <button type="button" class="btn btn-light border me-2" onclick="clearPassengerForm()">Reset</button>
          <button type="submit" id="submitBtn" class="btn btn-success px-4">Save File</button>
        </div>
      </form>
    </div>

    <div class="card">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>PASSENGER ID</th>
            <th>NAME</th>
            <th>NATIONALITY</th>
            <th>CONTACT DETAILS</th>
            <th>PASSPORT ID</th>
            <th class="text-end">ACTIONS</th>
          </tr>
        </thead>
        <tbody id="passengerTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API_ENDPOINT = "https://fictional-space-fishstick-v6xgj6w979wq269wr-3000.app.github.dev";
    let activePassengerId = null;

    async function loadPassengersData() {
      const tbody = document.getElementById('passengerTableBody');
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-3"><div class="spinner-border spinner-border-sm text-success"></div></td></tr>`;
      try {
        const res = await fetch(`${API_ENDPOINT}/passenger`);
        const rows = await res.json();
        tbody.innerHTML = "";

        rows.forEach(row => {
          tbody.insertAdjacentHTML('beforeend', `
            <tr>
              <td><strong>#${row.passenger_id}</strong></td>
              <td class="fw-bold">${row.name}</td>
              <td>${row.nationality || 'N/A'}</td>
              <td><small>${row.email}<br><span class="text-muted">${row.phone || ''}</span></small></td>
              <td><code>${row.passport_id}</code></td>
              <td class="text-end">
                <button class="btn btn-sm btn-outline-secondary me-1" onclick='setupPassengerEdit(${JSON.stringify(row)})'><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-outline-danger" onclick="deletePassengerEntry(${row.passenger_id})"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          `);
        });
      } catch (err) { tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error connecting to table.</td></tr>`; }
    }

    async function handlePassengerSubmit(e) {
      e.preventDefault();
      const payload = {
        name: document.getElementById('name').value,
        nationality: document.getElementById('nationality').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        passport_id: document.getElementById('passport_id').value
      };

      const url = activePassengerId ? `${API_ENDPOINT}/passenger/${activePassengerId}` : `${API_ENDPOINT}/passenger`;
      const method = activePassengerId ? 'PUT' : 'POST';

      const response = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        clearPassengerForm();
        loadPassengersData();
      }
    }

    function setupPassengerEdit(row) {
      activePassengerId = row.passenger_id;
      document.getElementById('formHeader').innerHTML = `<i class="fas fa-edit me-2"></i>Editing Record #${activePassengerId}`;
      document.getElementById('submitBtn').className = "btn btn-warning px-4 text-dark fw-bold";
      document.getElementById('submitBtn').innerText = "Apply Updates";
      document.getElementById('name').value = row.name;
      document.getElementById('nationality').value = row.nationality || "";
      document.getElementById('phone').value = row.phone || "";
      document.getElementById('email').value = row.email;
      document.getElementById('passport_id').value = row.passport_id;
    }

    function clearPassengerForm() {
      activePassengerId = null;
      document.getElementById('passengerForm').reset();
      document.getElementById('formHeader').innerHTML = `<i class="fas fa-user-plus me-2"></i>Register New Profile`;
      document.getElementById('submitBtn').className = "btn btn-success px-4";
      document.getElementById('submitBtn').innerText = "Save File";
    }

    async function deletePassengerEntry(id) {
      if (confirm("Permanently discard passenger profile?")) {
        await fetch(`${API_ENDPOINT}/passenger/${id}`, { method: 'DELETE' });
        loadPassengersData();
      }
    }

    document.addEventListener("DOMContentLoaded", loadPassengersData);
  </script>
</body>
</html>
